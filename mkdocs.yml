site_name: Lingbao Home
site_description: 灵宝的个人文档站 — 技术笔记与生活随笔
site_url: https://tanlon2miracle-ops.github.io/my_home/
site_author: Lingbao
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  custom_dir: overrides
  language: zh
  font: false
  icon:
    logo: material/home-circle
  favicon: null                       # 可后续替换为自定义 favicon
  palette:
    # ——— 亮色（默认，不跟系统）———
    - scheme: default
      primary: white
      accent: light-blue
      toggle:
        icon: material/weather-sunny
        name: 切换到暗色模式 🌙
    # ——— 暗色（手动切换）———
    - scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-night
        name: 切换到亮色模式 ☀️
  features:
    - navigation.tabs            # 顶部 Tab 导航
    - navigation.tabs.sticky     # 滚动时 Tab 保持可见
    - navigation.sections        # 侧边栏分组展开
    # navigation.expand 已移除 → 侧边栏默认折叠
    - navigation.prune           # 修剪不可见的导航项，减少页面体积
    - navigation.top             # 返回顶部按钮
    - navigation.indexes         # index 页作为章节首页
    - search.suggest             # 搜索建议
    - search.highlight           # 搜索高亮
    - content.code.copy          # 代码复制按钮
    - content.tabs.link          # 关联 Tab 切换
    - toc.follow                 # 目录跟随滚动

plugins:
  - tags
  - search:
      separator: '[\s\u200b\-]'  # 中文分词优化

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/palette-fix.js
  - javascripts/sidebar-toggle.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tanlon2miracle-ops/my_home

nav:
  - 首页: index.md
  - 技术:
      - tech/index.md
      - AI 算法:
          - tech/ai-algorithms/index.md
          - 模型训练笔记地图: tech/ai-algorithms/current-llm-training-notes-map/index.md
          - LLM 训练资料索引: tech/ai-algorithms/llm-training-reading-map/index.md
          - 安全 DPO 数据集设计: tech/ai-algorithms/safety-dpo-dataset-design/index.md
          - DeepSeek-R1 技术报告: tech/ai-algorithms/deepseek-r1-tech-report/index.md
          - Skywork Open Reasoner: tech/ai-algorithms/skywork-open-reasoner/index.md
          - Open-R1 开源复现: tech/ai-algorithms/open-r1/index.md
          - AceReason-Nemotron: tech/ai-algorithms/acereason-nemotron/index.md
          - Open-Reasoner-Zero: tech/ai-algorithms/open-reasoner-zero/index.md
          - verl 框架: tech/ai-algorithms/verl-framework/index.md
          - Llama-Nemotron 数据集: tech/ai-algorithms/llama-nemotron-post-training-dataset/index.md
          - CoPaw + AgentScope 生态: tech/ai-algorithms/copaw-agentscope-ecosystem/index.md
          - Self-Rewarding LMs 系列: tech/ai-algorithms/self-rewarding-language-models/index.md
          - Google TurboQuant: tech/ai-algorithms/google-turboquant/index.md
          - AutoResearch 生态: tech/ai-algorithms/autoresearch-ecosystem/index.md
      - 后端:
          - tech/backend/index.md
      - 折腾记录:
          - tech/tinkering/index.md
          - OpenClaw 架构深度解析: tech/tinkering/openclaw-architecture/index.md
  - 生活:
      - life/index.md
      - 随笔:
          - life/essays/index.md
          - 待产与新生儿购物清单整理: life/essays/pregnancy-newborn-shopping-checklist/index.md
          - 孕 30 周后到产后 3 个月的时间线规划: life/essays/pregnancy-birth-postpartum-timeline/index.md
