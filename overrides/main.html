{% extends "base.html" %}

{% block content %}
  {{ super() }}

  <!-- Giscus Comments -->
  {% if page and page.meta and page.meta.comments != false and not page.is_homepage %}
  <div style="margin-top: 3rem; padding-top: 2rem; border-top: 2px dashed rgba(255, 182, 193, 0.4);">
    <h2 style="font-family: 'Nunito', sans-serif; font-size: 1em; font-weight: 800; color: #1488E6; margin-bottom: 1.5rem;">🌸 评论区 — 说点什么吧~</h2>
    <script src="https://giscus.app/client.js"
            data-repo="tanlon2miracle-ops/my_home"
            data-repo-id=""
            data-category="General"
            data-category-id=""
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="light"
            data-lang="zh-CN"
            crossorigin="anonymous"
            async>
    </script>
  </div>
  {% endif %}
{% endblock %}

{% block footer %}
<footer class="md-footer">
  <div style="
    background: linear-gradient(135deg, rgba(240, 248, 255, 0.95), rgba(255, 182, 193, 0.1));
    border-top: 2px solid rgba(20, 136, 230, 0.1);
    padding: 2rem 1rem;
    text-align: center;
  ">
    <!-- Cute Logo -->
    <div style="font-size: 2em; margin-bottom: 0.3rem;">
      <span class="cute-sticker" style="display: inline-block; animation: float 3s ease-in-out infinite;">🌸</span>
      <span class="cute-sticker" style="display: inline-block; animation: float 3s ease-in-out infinite; animation-delay: 0.5s;">✨</span>
      <span class="cute-sticker" style="display: inline-block; animation: float 3s ease-in-out infinite; animation-delay: 1s;">🐳</span>
    </div>

    <!-- Site name -->
    <div style="
      font-family: 'Nunito', sans-serif;
      font-size: 1.2em;
      font-weight: 800;
      color: #1488E6;
      margin-bottom: 0.3rem;
    ">Lingbao Home</div>

    <!-- Motto -->
    <div style="
      font-family: 'Nunito', 'Noto Sans SC', sans-serif;
      font-size: 0.8em;
      color: #FFB6C1;
      margin-bottom: 1rem;
    ">记录生活，分享技术 💕</div>

    <!-- Divider -->
    <div style="
      height: 2px;
      max-width: 200px;
      margin: 0 auto 1rem;
      background: linear-gradient(90deg, transparent, #1488E6, #FFB6C1, #FFD100, transparent);
      border-radius: 2px;
    "></div>

    <!-- Build info -->
    <div style="
      font-family: 'Nunito', sans-serif;
      font-size: 0.75em;
      font-weight: 600;
      color: rgba(100, 100, 100, 0.5);
    ">
      Built with
      <a href="https://squidfunk.github.io/mkdocs-material/" style="color: #1488E6; text-decoration: none;">Material for MkDocs</a>
      ·
      <a href="https://github.com/tanlon2miracle-ops/my_home" style="color: #1488E6; text-decoration: none;">Source</a>
    </div>
  </div>
</footer>
{% endblock %}
