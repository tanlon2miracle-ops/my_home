{% extends "base.html" %}

{% block content %}
<style>
.cute-404 {
  text-align: center;
  padding: 6rem 2rem;
  position: relative;
}
.cute-404-emoji {
  font-size: 5em;
  display: inline-block;
  animation: float-404 3s ease-in-out infinite;
  margin-bottom: 1rem;
}
@keyframes float-404 {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-10px) rotate(-3deg); }
  75% { transform: translateY(-5px) rotate(3deg); }
}
.cute-404-code {
  font-family: 'Nunito', sans-serif;
  font-size: 8em;
  font-weight: 900;
  background: linear-gradient(135deg, #1488E6, #FFB6C1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin: 0.3rem 0;
}
.cute-404-msg {
  font-family: 'Nunito', 'Noto Sans SC', sans-serif;
  font-size: 1.4em;
  font-weight: 800;
  color: #1488E6;
  margin: 1rem 0;
}
.cute-404-sub {
  color: #888;
  font-size: 1.1em;
  margin: 0.5rem 0 2.5rem;
}
.cute-404-btn {
  display: inline-block;
  font-family: 'Nunito', 'Noto Sans SC', sans-serif;
  font-size: 0.95em;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #1488E6, #FFB6C1);
  padding: 0.8em 2em;
  border-radius: 30px;
  text-decoration: none;
  border: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 16px rgba(20, 136, 230, 0.25);
}
.cute-404-btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 8px 25px rgba(20, 136, 230, 0.3);
  color: #fff;
}
.cute-404-deco {
  font-size: 1.2em;
  margin-top: 2rem;
  opacity: 0.3;
}
</style>

<div class="cute-404">
  <div class="cute-404-emoji">🐾</div>
  <div class="cute-404-code">404</div>
  <div class="cute-404-msg">呜呜～ 页面走丢了</div>
  <div class="cute-404-sub">这个页面可能搬家了，或者从来没来过这里呢 🌸</div>
  <a href="{{ config.site_url }}" class="cute-404-btn">🏠 回到首页</a>
  <div class="cute-404-deco">
    🌸 · ✨ · 🐳 · 🐾 · 💕
  </div>
</div>
{% endblock %}
