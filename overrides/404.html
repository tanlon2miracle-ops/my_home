{% extends "base.html" %}

{% block content %}
<style>
.eva-404 {
  text-align: center;
  padding: 6rem 2rem;
  position: relative;
  overflow: hidden;
}
.eva-404::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(220, 38, 38, 0.03) 2px,
    rgba(220, 38, 38, 0.03) 4px
  );
  pointer-events: none;
  animation: scanline-scroll 8s linear infinite;
}
@keyframes scanline-scroll {
  0% { transform: translateY(0); }
  100% { transform: translateY(100px); }
}
.eva-404-alert {
  font-family: 'Orbitron', monospace;
  font-size: 0.8em;
  letter-spacing: 0.3em;
  color: #dc2626;
  text-transform: uppercase;
  animation: blink-alert 1s steps(1) infinite;
  margin-bottom: 2rem;
}
@keyframes blink-alert {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0.3; }
}
.eva-404-code {
  font-family: 'Orbitron', monospace;
  font-size: 8em;
  font-weight: 900;
  color: #dc2626;
  text-shadow: 0 0 30px rgba(220, 38, 38, 0.5), 0 0 60px rgba(220, 38, 38, 0.2);
  line-height: 1;
  margin: 0.5rem 0;
}
.eva-404-msg {
  font-family: 'Orbitron', monospace;
  font-size: 1.4em;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: #ff6600;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(255, 102, 0, 0.3);
  margin: 1.5rem 0;
}
.eva-404-sub {
  color: rgba(224, 224, 224, 0.6);
  font-size: 1.1em;
  margin: 1rem 0 2.5rem;
}
.eva-404-btn {
  display: inline-block;
  font-family: 'Orbitron', monospace;
  font-size: 0.85em;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #fff;
  background: linear-gradient(135deg, #dc2626 0%, #ff6600 100%);
  padding: 0.8em 2em;
  text-decoration: none;
  border: none;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
}
.eva-404-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4);
  color: #fff;
}
.eva-404-pattern {
  font-family: 'Orbitron', monospace;
  font-size: 0.6em;
  letter-spacing: 0.2em;
  color: rgba(220, 38, 38, 0.15);
  margin-top: 3rem;
}
</style>

<div class="eva-404">
  <div class="eva-404-alert">⚠ WARNING — AT FIELD DETECTED ⚠</div>
  <div class="eva-404-code">404</div>
  <div class="eva-404-msg">Signal Lost — Target Not Found</div>
  <div class="eva-404-sub">指定页面不存在，或已被 A.T. 力场屏蔽。</div>
  <a href="{{ config.site_url }}" class="eva-404-btn">▸ Return to NERV HQ</a>
  <div class="eva-404-pattern">
    NERV CENTRAL DOGMA — ERROR REPORT — PATTERN BLUE
  </div>
</div>
{% endblock %}
